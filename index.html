<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Parking Check</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      overflow: hidden;
    }

    #loginScreen {
      position: fixed;
      inset: 0;
      background: black;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 10000;
      color: white;
      gap: 10px;
      padding: 20px;
    }

    #loginScreen h2 {
      font-size: clamp(42px, 12vw, 80px);
      margin: 0 0 20px;
      text-align: center;
    }

    #loginScreen input {
      width: min(280px, 100%);
      padding: 12px;
      border-radius: 6px;
      border: none;
      font-size: 16px;
    }

    #loginScreen button {
      width: min(280px, 100%);
      min-height: 44px;
    }

    #loginFooter {
      position: absolute;
      bottom: 25px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 16px;
      opacity: 0.7;
      white-space: nowrap;
    }

    #intro {
      position: fixed;
      inset: 0;
      background: black;
      color: white;
      display: none;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 9999;
      transition: opacity 1.5s ease;
    }

    #topBar {
      position: absolute;
      top: 10px;
      left: 10px;
      right: 10px;
      background: white;
      padding: 15px;
      border-radius: 10px;
      z-index: 10;
      box-shadow: 0 4px 10px rgba(0,0,0,0.2);
      display: none;
    }

    .form-row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
    }

    #topBar input,
    #topBar select {
      padding: 10px;
      font-size: 16px;
      border-radius: 6px;
      border: 1px solid #ccc;
      flex: 1 1 120px;
      min-width: 120px;
      height: 44px;
      background: white;
    }

    #topBar input {
      -webkit-user-select: text;
      user-select: text;
      -webkit-touch-callout: default;
      ime-mode: active;
    }

    button {
      padding: 10px 16px;
      font-size: 16px;
      background: black;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      min-height: 44px;
      white-space: nowrap;
    }

    button:active {
      opacity: 0.8;
    }

    #map {
      width: 100vw;
      height: 100vh;
    }

    #toggleBar {
      display: none;
      position: absolute;
      top: 10px;
      right: 10px;
      z-index: 30;
      width: 44px;
      height: 44px;
      padding: 0;
      border-radius: 8px;
      font-size: 22px;
      line-height: 44px;
    }

    @media (max-width: 600px) {
      #toggleBar {
        display: block;
      }

      #topBar {
        top: 64px;
        left: 10px;
        right: 10px;
        padding: 12px;
        border-radius: 8px;
        max-height: 0;
        overflow: hidden;
        opacity: 0;
        pointer-events: none;
        transition: max-height 0.25s ease, opacity 0.25s ease;
      }

      #topBar.open {
        max-height: calc(100vh - 84px);
        opacity: 1;
        pointer-events: auto;
        overflow-y: auto;
      }

      #topBar .form-row {
        flex-direction: column;
        align-items: stretch;
      }

      #topBar input,
      #topBar select,
      #topBar button {
        width: 100%;
        min-width: 0;
        flex: none;
      }
    }
  </style>
</head>

<body>

  <div id="loginScreen">
    <h2>Parking Check</h2>
    <input id="email" type="email" placeholder="이메일" autocomplete="email">
    <input id="password" type="password" placeholder="비밀번호" autocomplete="current-password">
    <button type="button" onclick="login()">로그인</button>
    <div id="loginFooter">Made By MYUNGJIN</div>
  </div>

  <div id="intro">
    <h1>Parking Check</h1>
  </div>

  <button id="toggleBar" type="button" onclick="toggleBar()" aria-label="입력창 열기">☰</button>

  <div id="topBar">
    <div class="form-row">
      <input
        id="inspector"
        type="text"
        inputmode="text"
        lang="ko"
        placeholder="조사자명"
        autocomplete="name"
        autocapitalize="off"
        autocorrect="off"
        spellcheck="false"
      >

      <input
        id="carNumber"
        type="text"
        inputmode="text"
        lang="ko"
        placeholder="차량번호"
        autocomplete="off"
        autocapitalize="off"
        autocorrect="off"
        spellcheck="false"
      >

      <select id="district">
        <option value="">행정구역</option>
        <option value="북구">북구</option>
        <option value="서구">서구</option>
        <option value="남구">남구</option>
        <option value="중구">중구</option>
        <option value="달서구">달서구</option>
        <option value="달성군">달성군</option>
        <option value="수성구">수성구</option>
        <option value="동구">동구</option>
      </select>

      <select id="legal">
        <option value="적법">적법</option>
        <option value="불법">불법</option>
      </select>

      <select id="type">
        <option value="승용">승용</option>
        <option value="화물">화물</option>
      </select>

      <button type="button" onclick="saveData()">저장</button>
      <button type="button" onclick="logout()">로그아웃</button>
    </div>
  </div>

  <div id="map"></div>

  <script src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=d7b065e64cf74ac0b291af43de209b17&autoload=false"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
  <script src="app.js"></script>

  <script>
    function toggleBar() {
      const topBar = document.getElementById("topBar");
      const toggleButton = document.getElementById("toggleBar");

      topBar.classList.toggle("open");

      if (topBar.classList.contains("open")) {
        toggleButton.textContent = "×";
        toggleButton.setAttribute("aria-label", "입력창 닫기");
      } else {
        toggleButton.textContent = "☰";
        toggleButton.setAttribute("aria-label", "입력창 열기");
      }
    }
  </script>

</body>
</html>
