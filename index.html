<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Parking Check</title>

  <style>
    body { margin: 0; font-family: Arial, sans-serif; }

    #loginScreen {
      position: fixed; inset: 0; background: black;
      display: flex; flex-direction: column; justify-content: center; align-items: center;
      z-index: 10000; color: white; gap: 10px; padding: 20px;
    }

    #loginScreen h2 { font-size: 80px; margin: 0; transform: translateY(-40px); }

    #loginScreen input {
      width: 240px; padding: 10px; border-radius: 6px;
      border: none; font-size: 14px;
    }

    #loginScreen button { width: 240px; min-height: 44px; }

    #loginFooter {
      position: absolute; bottom: 25px; left: 50%;
      transform: translateX(-50%);
      font-size: 16px; opacity: 0.7;
    }

    #intro {
      position: fixed; inset: 0; background: black; color: white;
      display: none; flex-direction: column; justify-content: center; align-items: center;
      z-index: 9999; transition: opacity 1.5s ease;
    }

    #topBar {
      position: absolute; top: 10px; left: 10px; right: 10px;
      background: white; padding: 15px; border-radius: 10px;
      z-index: 10; box-shadow: 0 4px 10px rgba(0,0,0,0.2);
      display: none;
    }

    .form-row { display: flex; gap: 10px; flex-wrap: wrap; }

    #topBar input, #topBar select {
      padding: 10px; font-size: 16px;
      border-radius: 6px; border: 1px solid #ccc;
      flex: 1; min-width: 120px;
    }

    button {
      padding: 10px 20px; font-size: 16px;
      background: black; color: white;
      border: none; border-radius: 6px;
      cursor: pointer; min-height: 44px;
    }

    #map { width: 100vw; height: 100vh; }
  </style>
</head>

<body>

<div id="loginScreen">
  <h2>Parking Check</h2>
  <input id="email" placeholder="이메일">
  <input id="password" type="password" placeholder="비밀번호">
  <button onclick="login()">로그인</button>
  <div id="loginFooter">Made By MYUNGJIN</div>
</div>

<div id="intro">
  <h1>Parking Check</h1>
</div>

<div id="topBar">
  <div class="form-row">

    <!-- 🔥 한글 입력 안정화 -->
    <input id="inspector" placeholder="조사자명"
      inputmode="text" autocomplete="off" lang="ko">

    <input id="carNumber" placeholder="차량번호"
      inputmode="text" autocomplete="off" lang="ko">

    <select id="district">
      <option value="">행정구역</option>
      <option value="북구">북구</option>
      <option value="서구">서구</option>
      <option value="남구">남구</option>
      <option value="중구">중구</option>
      <option value="달서구">달서구</option>
      <option value="달성군">달성군</option>
      <option value="수성구">수성구</option>
      <option value="동구">동구</option>
    </select>

    <select id="legal">
      <option value="적법">적법</option>
      <option value="불법">불법</option>
    </select>

    <!-- 🔥 이게 빠져있던 핵심 -->
    <select id="type">
      <option value="승용">승용</option>
      <option value="화물">화물</option>
    </select>

    <button onclick="saveData()">저장</button>
    <button onclick="logout()">로그아웃</button>

  </div>
</div>

<div id="map"></div>

<script src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=d7b065e64cf74ac0b291af43de209b17&autoload=false"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<script src="app.js"></script>

</body>
</html>
